backend:
  name: github
  repo: your-username/repo-name  # 👈 غيّر هنا
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "products"
    label: "المنتجات"
    folder: "_data/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "الاسم", name: "name", widget: "string" }
      - { label: "السعر", name: "price", widget: "number" }
      - { label: "الصورة", name: "img", widget: "image" }
      - { label: "الوصف", name: "desc", widget: "text", required: false }
      - { label: "التصنيف", name: "category", widget: "select", options: ["عرائس", "ألعاب", "يدوي"], default: "عرائس" }

  - name: "settings"
    label: "إعدادات الموقع"
    files:
      - name: "general"
        label: "المعلومات العامة"
        file: "_data/settings.yml"
        fields:
          - { label: "عنوان الموقع", name: "site_title", widget: "string" }
          - { label: "الشعار", name: "logo", widget: "image" }
          - { label: "وصف الموقع", name: "site_description", widget: "text" }
