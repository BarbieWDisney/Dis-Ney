# إعدادات الموقع الأساسية
baseurl: ""
url: "https://your-username.github.io"  # 👈 غيّر this

# تعريف مجموعة المنتجات
collections:
  products:
    output: true
    permalink: /products/:title/

# الإعدادات الافتراضية
defaults:
  - scope:
      path: ""
      type: "products"
    values:
      layout: "default"

# تحسينات SEO
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
